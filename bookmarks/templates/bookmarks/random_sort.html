{% load i18n %}
<form action="" method="post" style="display: inline;">
  {% csrf_token %}
  <input type="hidden" name="sort" value="random">
  {# 传递经过白名单验证的查询参数，保留所有筛选条件，使用 force_escape 防止 XSS #}
  {% for key, value in filtered_params.items %}
    <input type="hidden" name="{{ key|force_escape }}" value="{{ value|force_escape }}">
  {% endfor %}
  <button type="submit" class="btn ml-2" title="{% translate 'Random sort' %}">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" stroke-width="2"
         stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
      <path d="M18 4l3 3l-3 3"></path>
      <path d="M18 20l3 -3l-3 -3"></path>
      <path d="M3 7h3a5 5 0 0 1 5 5a5 5 0 0 1 -5 5h-3"></path>
      <path d="M21 7h-3a5 5 0 0 0 -5 5a5 5 0 0 0 5 5h3"></path>
    </svg>
  </button>
</form>
