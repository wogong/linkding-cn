{% load i18n static %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'en' }}" class="reader-mode">
<head>
  <meta charset="UTF-8">
  <meta name="csrfmiddlewaretoken" content="{{ csrf_token }}">
  <title>{% translate "Reader view" %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimal-ui">
  {% if request.user_profile.theme == 'light' %}
    <link href="{% static 'theme-light.css' %}?v={{ app_version }}" rel="stylesheet" type="text/css"/>
  {% elif request.user_profile.theme == 'dark' %}
    <link href="{% static 'theme-dark.css' %}?v={{ app_version }}" rel="stylesheet" type="text/css"/>
  {% else %}
    <link href="{% static 'theme-dark.css' %}?v={{ app_version }}" rel="stylesheet" type="text/css"
          media="(prefers-color-scheme: dark)"/>
    <link href="{% static 'theme-light.css' %}?v={{ app_version }}" rel="stylesheet" type="text/css"
          media="(prefers-color-scheme: light)"/>
  {% endif %}
  <style>
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      color: var(--text-color, #999);
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border-color, #333);
      border-top-color: var(--primary-color, #5856e0);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-text {
      font-size: 14px;
      opacity: 0.7;
    }
    .loading-error {
      color: var(--danger-color, #e74c3c);
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>
<div class="loading-container">
  <div class="loading-spinner"></div>
  <p class="loading-text">{% translate "Processing article..." %}</p>
  <p class="loading-error" id="error-msg"></p>
</div>
{{ api_base_url|default:"/api/"|json_script:"reader-api-base-url" }}
<script src="{% url 'javascript-catalog' %}"></script>
<script type="application/javascript">
  (function() {
    var bookmarkId = {{ bookmark_id }};
    var assetId = {{ asset_id }};
    var apiBaseRaw = JSON.parse(document.getElementById("reader-api-base-url").textContent);
    function normalizeBaseUrl(baseUrl) {
      var value = String(baseUrl || "").trim();
      if (!value) return "/api/";
      return value.replace(/\/+$/, "") + "/";
    }
    function joinPath(baseUrl, path) {
      return normalizeBaseUrl(baseUrl) + String(path || "").replace(/^\/+/, "");
    }
    var apiBase = normalizeBaseUrl(apiBaseRaw);
    var maxAttempts = 60; // 60 * 2s = 2 min max
    var attempt = 0;

    function poll() {
      attempt++;
      if (attempt > maxAttempts) {
        showError("{% translate 'Timed out waiting for article to be ready.' %}");
        return;
      }

      fetch(joinPath(apiBase, "bookmarks/" + bookmarkId + "/assets/" + assetId + "/"), {
        headers: { "X-CSRFToken": document.querySelector("meta[name=csrfmiddlewaretoken]").content }
      })
        .then(function(r) {
          if (r.status === 404) {
            showError("{% translate 'Failed to process article. Please refresh to try again.' %}");
            return null;
          }
          return r.json();
        })
        .then(function(data) {
          if (!data) return;
          if (data.status === "complete") {
            // Article ready — reload to show it
            window.location.reload();
          } else if (data.status === "failure") {
            showError("{% translate 'Failed to process article. Please try again.' %}");
          } else {
            // Still pending — poll again
            setTimeout(poll, 2000);
          }
        })
        .catch(function() {
          setTimeout(poll, 2000);
        });
    }

    function showError(msg) {
      document.querySelector(".loading-spinner").style.display = "none";
      document.querySelector(".loading-text").style.display = "none";
      var el = document.getElementById("error-msg");
      el.textContent = msg;
      el.style.display = "block";
    }

    setTimeout(poll, 1000); // Start polling after 1s
  })();
</script>
</body>
</html>
